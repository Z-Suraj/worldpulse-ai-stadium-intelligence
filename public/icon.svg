<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Beautiful dark rounded background -->
  <rect width="512" height="512" rx="128" fill="#030712"/>
  <!-- Glowing gradient circle -->
  <defs>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06b6d4" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#030712" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#centerGlow)"/>
  <!-- Outer Stadium Ring -->
  <ellipse cx="256" cy="256" rx="180" ry="120" fill="none" stroke="url(#glow)" stroke-width="12" opacity="0.85" />
  <!-- Inner Stadium Ring -->
  <ellipse cx="256" cy="256" rx="140" ry="90" fill="none" stroke="url(#glow)" stroke-width="6" stroke-dasharray="16, 8" opacity="0.6" />
  <!-- Digital Pulse Wave (vertical bars in circle) -->
  <g stroke="url(#glow)" stroke-width="6" stroke-linecap="round">
    <line x1="200" y1="230" x2="200" y2="282" />
    <line x1="228" y1="210" x2="228" y2="302" />
    <line x1="256" y1="180" x2="256" y2="332" />
    <line x1="284" y1="210" x2="284" y2="302" />
    <line x1="312" y1="230" x2="312" y2="282" />
  </g>
  <!-- Core Soccer Star/Pulse Node -->
  <circle cx="256" cy="256" r="20" fill="#ffffff" />
  <circle cx="256" cy="256" r="28" fill="none" stroke="#22d3ee" stroke-width="3" stroke-dasharray="4, 4" />
</svg>
